<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Arb Scanner</title>
<style>
:root {
  --bg:#0f0f0f; --bg2:#1a1a1a; --bg3:#222;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.15);
  --text:#f0f0f0; --text2:#999; --text3:#555;
  --green:#4ade80; --green-bg:rgba(74,222,128,0.1);
  --red:#f87171;   --red-bg:rgba(248,113,113,0.1);
  --amber:#fbbf24; --amber-bg:rgba(251,191,36,0.1);
  --blue:#60a5fa;  --blue-bg:rgba(96,165,250,0.1);
  --radius:10px; --radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  background:#111;color:var(--text);font-size:14px;min-height:100vh;padding-bottom:4rem}
.page-wrap{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh}

header{padding:1rem 1rem 0.75rem;border-bottom:0.5px solid var(--border);
  display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--bg);z-index:10}
.logo{width:32px;height:32px;background:var(--blue-bg);border:0.5px solid var(--border2);
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
header h1{font-size:16px;font-weight:600}
header .sub{font-size:12px;color:var(--text2)}
.btn-scan{margin-left:auto;background:var(--blue-bg);color:var(--blue);
  border:0.5px solid rgba(96,165,250,.4);padding:8px 14px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-scan:active{opacity:.7}
.btn-scan:disabled{opacity:.4;cursor:not-allowed}

.content{padding:0.75rem 1rem}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);
  padding:0.875rem 1rem;margin-bottom:0.625rem}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
  color:var(--text2);margin-bottom:0.75rem}

.field-row{display:flex;align-items:center;gap:8px;margin-bottom:0.5rem}
.field-row:last-child{margin-bottom:0}
.field-row label{font-size:13px;color:var(--text2);min-width:130px;flex-shrink:0}
input[type=number],input[type=text],select{
  background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);font-size:13px;padding:7px 10px;outline:none;transition:border-color .15s;
  -webkit-appearance:none}
input:focus,select:focus{border-color:var(--blue)}
.setup-inputs{display:flex;gap:8px;align-items:center}
.setup-inputs input{width:80px}
.unit{font-size:12px;color:var(--text2)}

/* ── Book filters ── */
.books-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.book-chip{display:flex;align-items:center;gap:5px;padding:4px 9px;
  border-radius:20px;border:0.5px solid var(--border2);background:var(--bg3);
  font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none}
.book-chip input{display:none}
.book-chip.active{background:var(--blue-bg);color:var(--blue);border-color:rgba(96,165,250,.4)}
.book-chip.all-chip.active{background:var(--green-bg);color:var(--green);border-color:rgba(74,222,128,.4)}
.book-chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── League / match ── */
.league-header{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
  color:var(--text3);padding:8px 0 6px;border-bottom:0.5px solid var(--border);margin-bottom:6px}
.match-card{background:var(--bg2);border:0.5px solid var(--border);
  border-radius:var(--radius);margin-bottom:6px;overflow:hidden}
.match-card.has-arb{border-color:rgba(74,222,128,.3)}
.match-header{display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;cursor:pointer}
.match-header:active{background:var(--bg3)}
.match-teams{font-size:14px;font-weight:600}
.match-meta{font-size:12px;color:var(--text2);margin-top:2px}
.match-right{display:flex;align-items:center;gap:8px}
.chevron{font-size:11px;color:var(--text3);transition:transform .2s}
.match-card.open .chevron{transform:rotate(180deg)}
.match-detail{display:none;padding:0 14px 14px;border-top:0.5px solid var(--border)}
.match-card.open .match-detail{display:block}

/* status badges */
.status-badge{display:flex;align-items:center;gap:8px;padding:10px 14px;
  border-radius:var(--radius);font-size:13px;font-weight:500;margin-bottom:0.625rem}
.status-badge.arb{background:var(--green-bg);color:var(--green);border:0.5px solid rgba(74,222,128,.3)}
.status-badge.partial{background:var(--amber-bg);color:var(--amber);border:0.5px solid rgba(251,191,36,.3)}
.status-badge.noarb{background:var(--red-bg);color:var(--red);border:0.5px solid rgba(248,113,113,.3)}
.status-badge.single{background:var(--blue-bg);color:var(--blue);border:0.5px solid rgba(96,165,250,.3)}

/* pill */
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.pill-green{background:var(--green-bg);color:var(--green);border:0.5px solid rgba(74,222,128,.3)}
.pill-amber{background:var(--amber-bg);color:var(--amber);border:0.5px solid rgba(251,191,36,.3)}
.pill-red  {background:var(--red-bg);  color:var(--red);  border:0.5px solid rgba(248,113,113,.3)}
.pill-gray {background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2)}
.pill-blue {background:var(--blue-bg);color:var(--blue);border:0.5px solid rgba(96,165,250,.3)}

/* metrics */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:10px 0 8px}
.metric-card{background:var(--bg2);border:0.5px solid var(--border);
  border-radius:var(--radius);padding:0.75rem}
.metric-card .mlabel{font-size:11px;color:var(--text2);margin-bottom:4px}
.metric-card .mvalue{font-size:20px;font-weight:600}
.metric-card.green{border-color:rgba(74,222,128,.3);background:var(--green-bg)}
.metric-card.green .mvalue{color:var(--green)}
.metric-card.red{border-color:rgba(248,113,113,.3);background:var(--red-bg)}
.metric-card.red .mvalue{color:var(--red)}
.metric-card.amber{border-color:rgba(251,191,36,.3);background:var(--amber-bg)}
.metric-card.amber .mvalue{color:var(--amber)}

/* legs */
.legs-header{display:grid;grid-template-columns:1fr 80px 72px;gap:6px;margin:10px 0 4px}
.legs-header span{font-size:11px;color:var(--text3);font-weight:500;
  text-transform:uppercase;letter-spacing:.04em;padding:0 2px}
.leg-row{display:grid;grid-template-columns:1fr 80px 72px;gap:6px;
  align-items:center;margin-bottom:4px}
.leg-left{display:flex;flex-direction:column;gap:3px}
.leg-outcome{font-size:13px;font-weight:600;color:var(--text)}
.leg-book{font-size:11px;color:var(--blue)}
.leg-odds-val{font-size:15px;font-weight:700;text-align:center;
  background:var(--bg3);border-radius:var(--radius-sm);padding:6px 4px;color:var(--text)}
.leg-stake-val{font-size:13px;font-weight:600;text-align:right;
  padding-right:4px;color:var(--text2)}
.leg-stake-val.kl-active{color:var(--amber)}

/* KL toggle */
.kl-toggle-row{display:flex;align-items:center;justify-content:space-between;
  padding:5px 2px 8px;border-top:0.5px solid var(--border);margin-top:2px}
.kl-label{font-size:12px;color:var(--text)}
.kl-sub{font-size:11px;color:var(--text2);margin-top:1px}
.toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--bg3);
  border:0.5px solid var(--border2);border-radius:11px;cursor:pointer;transition:background .2s}
.toggle-track::after{content:'';position:absolute;width:16px;height:16px;
  background:var(--text2);border-radius:50%;top:2px;left:2px;transition:transform .2s,background .2s}
.toggle-switch input:checked+.toggle-track{background:var(--amber-bg);border-color:var(--amber)}
.toggle-switch input:checked+.toggle-track::after{transform:translateX(18px);background:var(--amber)}

/* results table */
.results-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.results-table th{text-align:left;color:var(--text3);font-weight:500;padding:4px 6px;
  border-bottom:0.5px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.results-table td{padding:7px 6px;border-bottom:0.5px solid var(--border);vertical-align:middle}
.results-table tr:last-child td{border-bottom:none}
.net-pos{color:var(--green);font-weight:600}
.net-neg{color:var(--red)}
.net-warn{color:var(--amber);font-weight:600}
.type-pill{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.type-auto{background:var(--bg3);color:var(--text2)}
.type-kl{background:var(--amber-bg);color:var(--amber)}
.footnote{font-size:11px;color:var(--text2);margin-top:8px;line-height:1.5}

/* loading / empty */
.loading-card{background:var(--bg2);border:0.5px solid var(--border);
  border-radius:var(--radius);padding:14px;margin-bottom:6px;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.9}}
.loading-line{height:13px;background:var(--bg3);border-radius:4px}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state .big{font-size:28px;margin-bottom:8px}

/* toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);
  padding:10px 18px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;
  pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(74,222,128,.5);color:var(--green)}
.toast.err{border-color:rgba(248,113,113,.5);color:var(--red)}
</style>
</head>
<body>
<div class="page-wrap">

<header>
  <div class="logo">⚡</div>
  <div>
    <h1>Arb Scanner</h1>
    <div class="sub" id="lastScan">3-way arbitrage</div>
  </div>
  <button class="btn-scan" id="scanBtn" onclick="startScan()">⟳ Scan</button>
</header>

<div class="content">

<!-- SETUP -->
<div class="card">
  <div class="card-title">Ρυθμίσεις</div>
  <div class="field-row">
    <label>Proxy URL</label>
    <input type="text" id="proxyUrl"
      value="https://zefksis.wasmer.app/wp-content/uploads/scanner/arb-proxy.php"
      style="width:100%;font-size:11px">
  </div>

  <div class="field-row">
    <label>Συνολικό ποντάρισμα</label>
    <div class="setup-inputs">
      <span class="unit">€</span>
      <input type="number" id="totalStake" value="100" min="1" step="10"
        oninput="refreshAllCalcs()">
    </div>
  </div>
  <div class="field-row">
    <label>% γνωστής απώλειας</label>
    <div class="setup-inputs">
      <input type="number" id="lossPercent" value="20" min="1" max="99" step="1"
        style="width:60px" oninput="refreshAllCalcs()">
      <span class="unit">%</span>
    </div>
  </div>
</div>

<!-- BOOK FILTERS -->
<div class="card">
  <div class="card-title">Books ΕΕΕΠ</div>
  <div class="books-grid" id="booksGrid"></div>
</div>

<!-- MATCH LIST -->
<div id="matchList"></div>

</div><!-- /content -->
<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────
const ALL_BOOKS = [
  'stoiximan','novibet','betsson','bwin','bet365',
  'fonbet','interwetten','efbet','efbet.net',
  'sportingbet','vistabet','winmasters','netbet','pokerstars'
];

const PROXY    = () => document.getElementById('proxyUrl').value.trim();
const getTotal = () => parseFloat(document.getElementById('totalStake').value) || 0;
const getLossP = () => (parseFloat(document.getElementById('lossPercent').value) || 20) / 100;

let scanData  = [];
let klState   = {};   // { rid: [bool,bool,bool] }
let activeBooks = new Set(ALL_BOOKS);

// ── Book filter UI ────────────────────────────────────────────
function buildBookChips() {
  const grid = document.getElementById('booksGrid');
  // "Όλα" chip
  const allChip = document.createElement('label');
  allChip.className = 'book-chip all-chip active';
  allChip.id = 'chip-all';
  allChip.innerHTML = '<span class="dot"></span>Όλα';
  allChip.onclick = () => toggleAll();
  grid.appendChild(allChip);

  for (const book of ALL_BOOKS) {
    const chip = document.createElement('label');
    chip.className = 'book-chip active';
    chip.id = `chip-${book}`;
    chip.innerHTML = `<span class="dot"></span>${bookLabel(book)}`;
    chip.onclick = () => toggleBook(book);
    grid.appendChild(chip);
  }
}

function toggleAll() {
  const allActive = activeBooks.size === ALL_BOOKS.length;
  if (allActive) {
    activeBooks.clear();
  } else {
    ALL_BOOKS.forEach(b => activeBooks.add(b));
  }
  updateChips();
  if (scanData.length) renderAll();
}

function toggleBook(book) {
  if (activeBooks.has(book)) activeBooks.delete(book);
  else activeBooks.add(book);
  updateChips();
  if (scanData.length) renderAll();
}

function updateChips() {
  const allActive = activeBooks.size === ALL_BOOKS.length;
  document.getElementById('chip-all')?.classList.toggle('active', allActive);
  for (const book of ALL_BOOKS) {
    document.getElementById(`chip-${book}`)?.classList.toggle('active', activeBooks.has(book));
  }
}

function bookLabel(b) {
  const map = {
    'efbet.net':'Efbet','stoiximan':'Stoiximan','novibet':'Novibet',
    'betsson':'Betsson','bwin':'Bwin','bet365':'Bet365','fonbet':'Fonbet',
    'interwetten':'Interwetten','efbet':'Efbet(gr)','sportingbet':'Sportingbet',
    'vistabet':'Vistabet','winmasters':'Winmasters','netbet':'Netbet','pokerstars':'PokerStars'
  };
  return map[b] || b;
}

// ── Scan ──────────────────────────────────────────────────────
async function startScan() {
  const btn = document.getElementById('scanBtn');
  btn.disabled = true; btn.textContent = '⟳ …';
  document.getElementById('matchList').innerHTML = skeleton(5);
  scanData = []; klState = {};

  try {
    const evRes = await fetch(`${PROXY()}?endpoint=events`);
    if (!evRes.ok) throw new Error(`HTTP ${evRes.status}`);
    const ev = await evRes.json();
    if (!ev.matches?.length) {
      document.getElementById('matchList').innerHTML =
        '<div class="empty-state"><div class="big">📭</div>Δεν βρέθηκαν αγώνες σήμερα</div>';
      return;
    }

    const results = [];
    for (let i = 0; i < ev.matches.length; i += 4) {
      const batch = ev.matches.slice(i, i + 4);
      const bRes  = await Promise.all(batch.map(m =>
        fetch(`${PROXY()}?endpoint=odds&rid=${m.rid}`)
          .then(r => r.json())
          .then(d => ({ ...m, ...d }))
          .catch(() => ({ ...m, error: true }))
      ));
      results.push(...bRes);
    }

    scanData = results;
    for (const m of results) klState[m.rid] = [false, false, false];

    renderAll();
    document.getElementById('lastScan').textContent =
      'Scan: ' + new Date().toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'});

  } catch(e) {
    document.getElementById('matchList').innerHTML =
      `<div class="empty-state"><div class="big">⚠️</div>${e.message}</div>`;
    toast('Σφάλμα: ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = '⟳ Scan';
  }
}

// ── Render all ────────────────────────────────────────────────
function renderAll() {
  if (!scanData.length) return;
  const open = new Set(
    [...document.querySelectorAll('.match-card.open')].map(el => el.dataset.rid)
  );
  const leagues = {};
  for (const m of scanData) {
    if (!leagues[m.league]) leagues[m.league] = [];
    leagues[m.league].push(m);
  }
  let html = '';
  for (const [league, matches] of Object.entries(leagues)) {
    html += `<div class="league-header">${esc(league)}</div>`;
    for (const m of matches) html += renderCard(m);
  }
  document.getElementById('matchList').innerHTML = html;
  for (const rid of open) {
    document.getElementById(`card-${rid}`)?.classList.add('open');
  }
}

// ── Render single card ────────────────────────────────────────
function renderCard(m) {
  if (m.error) return '';

  // Φιλτράρισμα active books
  const allBooks  = m.eeepa_books || {};
  const filtered  = Object.fromEntries(
    Object.entries(allBooks).filter(([k]) => activeBooks.has(k))
  );

  // Best odds από filtered books
  let hO = 0, hB = '—', xO = 0, xB = '—', aO = 0, aB = '—';
  for (const [book, odds] of Object.entries(filtered)) {
    if (odds.H > hO) { hO = odds.H; hB = book; }
    if (odds.X > xO) { xO = odds.X; xB = book; }
    if (odds.A > aO) { aO = odds.A; aB = book; }
  }

  const bookCount   = Object.keys(filtered).length;
  const valid       = hO > 1 && xO > 1 && aO > 1;
  const kl          = klState[m.rid] || [false, false, false];
  const total       = getTotal();
  const lp          = getLossP();
  const oddsArr     = [hO, xO, aO];

  // Stake calculation — ίδια λογική με index.html
  const fixedArr  = oddsArr.map((o, i) => kl[i] && o > 1 ? (total*(1-lp))/o : null);
  const fixedSum  = fixedArr.reduce((a,v) => a + (v!==null?v:0), 0);
  const implArr   = oddsArr.map(o => o > 1 ? 1/o : 0);
  const freeImpl  = implArr.reduce((a,v,i) => a + (fixedArr[i]===null?v:0), 0);
  const freeTotal = Math.max(0, total - fixedSum);
  const stakes    = fixedArr.map((v,i) =>
    v !== null ? v : (freeImpl > 0 ? (implArr[i]/freeImpl)*freeTotal : 0)
  );
  const sumImpl   = implArr.reduce((a,b) => a+b, 0);
  const totalSt   = stakes.reduce((a,b) => a+b, 0);
  const returns   = stakes.map((s,i) => s*oddsArr[i]);
  const nets      = returns.map(r => r - totalSt);
  const minNet    = valid ? Math.min(...nets) : 0;
  const maxNet    = valid ? Math.max(...nets) : 0;
  const isArb     = valid && minNet > -0.01;
  const klCount   = kl.filter(Boolean).length;
  const multiBook = valid && new Set([hB,xB,aB]).size > 1;

  // Header pill
  let headerPill;
  if (!valid || bookCount === 0) {
    headerPill = bookCount === 0
      ? '<span class="pill pill-gray">Κανένα book</span>'
      : '<span class="pill pill-gray">—</span>';
  } else if (bookCount === 1) {
    headerPill = '<span class="pill pill-blue">Single book</span>';
  } else if (isArb && multiBook) {
    headerPill = '<span class="pill pill-green">✓ ARB</span>';
  } else if (isArb) {
    headerPill = '<span class="pill pill-amber">✓ Same book</span>';
  } else if (klCount > 0) {
    headerPill = '<span class="pill pill-amber">⚡ ΕΝ ΓΝΩΣΕΙ</span>';
  } else {
    headerPill = `<span class="pill pill-red">${(sumImpl*100).toFixed(1)}%</span>`;
  }

  // Legs
  const legDefs = [
    {label:'1', outcome:'H', book:hB, odds:hO, stake:stakes[0], net:nets[0], kl:kl[0], idx:0},
    {label:'X', outcome:'X', book:xB, odds:xO, stake:stakes[1], net:nets[1], kl:kl[1], idx:1},
    {label:'2', outcome:'A', book:aB, odds:aO, stake:stakes[2], net:nets[2], kl:kl[2], idx:2},
  ];

  let legsHtml = `<div class="legs-header">
    <span>Αποτέλεσμα / Book</span><span>Απόδοση</span><span>Ποντ.</span>
  </div>`;

  for (const leg of legDefs) {
    const sc = leg.kl ? 'kl-active' : '';
    const st = valid ? `€${leg.stake.toFixed(2)}` : '—';
    const klAmtStyle = leg.kl ? '' : 'display:none';
    legsHtml += `
    <div class="leg-row">
      <div class="leg-left">
        <div class="leg-outcome">${leg.label} <span style="font-weight:400;color:var(--text2);font-size:11px">${leg.outcome}</span></div>
        <div class="leg-book">${esc(leg.book)}</div>
      </div>
      <div class="leg-odds-val">${leg.odds > 1 ? leg.odds.toFixed(2) : '—'}</div>
      <div class="leg-stake-val ${sc}">${st}</div>
    </div>
    <div class="kl-toggle-row">
      <div>
        <div class="kl-label">${leg.label} — εν γνώσει</div>
        <div class="kl-sub">-<span class="kl-pct">${Math.round(lp*100)}</span>% αν κερδίσει</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--amber);${klAmtStyle}">€${leg.stake.toFixed(2)}</span>
        <label class="toggle-switch">
          <input type="checkbox" ${leg.kl?'checked':''}
            onchange="toggleKL('${m.rid}',${leg.idx},this.checked)">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>`;
  }

  // Detail content
  let detailBody = legsHtml;

  if (valid) {
    const mG = maxNet >= -0.01 ? 'green' : 'red';
    const mB = minNet >= -0.01 ? 'green' : klCount > 0 ? 'amber' : 'red';
    detailBody += `
    <div class="metrics">
      <div class="metric-card"><div class="mlabel">Implied</div>
        <div class="mvalue" style="font-size:18px">${(sumImpl*100).toFixed(2)}%</div></div>
      <div class="metric-card"><div class="mlabel">Margin</div>
        <div class="mvalue" style="font-size:18px">${((sumImpl-1)*100).toFixed(2)}%</div></div>
      <div class="metric-card ${mG}"><div class="mlabel">Καλύτερο</div>
        <div class="mvalue">${maxNet>=0?'+':''}€${maxNet.toFixed(2)}</div></div>
      <div class="metric-card ${mB}"><div class="mlabel">Χειρότερο</div>
        <div class="mvalue">${minNet>=0?'+':''}€${minNet.toFixed(2)}</div></div>
    </div>`;

    // Status badge
    let badge;
    if (bookCount === 1) {
      badge = `<div class="status-badge single">ℹ Single book — χρησιμοποίησε εν γνώσει</div>`;
    } else if (isArb && multiBook) {
      badge = `<div class="status-badge arb">✓ Arb — κέρδος εγγυημένο σε ${new Set([hB,xB,aB]).size} books</div>`;
    } else if (isArb) {
      badge = `<div class="status-badge partial">⚡ Arb ίδιο book — έλεγξε κανόνες</div>`;
    } else if (klCount > 0) {
      badge = `<div class="status-badge partial">⚡ Ελεγχόμενη έκθεση — ${klCount} σημείο${klCount>1?'α':''} εν γνώσει</div>`;
    } else {
      badge = `<div class="status-badge noarb">✕ Δεν υπάρχει arb</div>`;
    }
    detailBody += badge;

    // Table
    detailBody += `<table class="results-table"><thead><tr>
      <th>Σημείο</th><th>Book</th><th>Απόδ.</th><th>Ποντ.</th><th>Net P/L</th><th>Τύπος</th>
    </tr></thead><tbody>`;
    for (const leg of legDefs) {
      const nc   = leg.kl ? 'net-warn' : leg.net >= -0.01 ? 'net-pos' : 'net-neg';
      const pill = leg.kl
        ? `<span class="type-pill type-kl">-${Math.round(lp*100)}%</span>`
        : `<span class="type-pill type-auto">auto</span>`;
      detailBody += `<tr>
        <td><strong>${leg.label}</strong></td>
        <td style="color:var(--text2)">${esc(leg.book)}</td>
        <td style="font-weight:600">${leg.odds.toFixed(2)}</td>
        <td style="font-weight:600">€${leg.stake.toFixed(2)}</td>
        <td class="${nc}">${leg.net>=0?'+':''}€${leg.net.toFixed(2)}</td>
        <td>${pill}</td></tr>`;
    }
    detailBody += '</tbody></table>';

    const books = [...new Set([hB,xB,aB].filter(b=>b&&b!=='—'))];
    const fn = isArb && multiBook
      ? `Multi-book arb μεταξύ: ${books.join(', ')}.`
      : isArb
      ? 'Προσοχή: όλα στο ίδιο book — ενδέχεται να μην επιτρέπεται.'
      : klCount > 0
      ? `Σημεία "εν γνώσει" → ζημιά ακριβώς -${Math.round(lp*100)}% (€${(total*lp).toFixed(2)}) αν κερδίσουν.`
      : 'Δεν υπάρχει arb με τα επιλεγμένα books.';
    detailBody += `<p class="footnote">${fn}</p>`;
  } else if (bookCount === 0) {
    detailBody += `<p class="footnote" style="margin-top:10px">Κανένα από τα επιλεγμένα books δεν έχει odds για αυτόν τον αγώνα.</p>`;
  }

  return `<div class="match-card ${isArb&&multiBook?'has-arb':''}" id="card-${m.rid}" data-rid="${m.rid}">
    <div class="match-header" onclick="toggleCard('${m.rid}')">
      <div>
        <div class="match-teams">${esc(m.home)} <span style="color:var(--text3)">vs</span> ${esc(m.away)}</div>
        <div class="match-meta">${esc(m.league)} · ${m.all_books_count||'?'} books · ${bookCount} ΕΕΕΠ</div>
      </div>
      <div class="match-right">${headerPill}<span class="chevron">▾</span></div>
    </div>
    <div class="match-detail">${detailBody}</div>
  </div>`;
}

// ── KL toggle ─────────────────────────────────────────────────
function toggleKL(rid, idx, checked) {
  if (!klState[rid]) klState[rid] = [false,false,false];
  klState[rid][idx] = checked;
  const m = scanData.find(x => x.rid === rid);
  if (!m) return;
  const card    = document.getElementById(`card-${rid}`);
  const wasOpen = card?.classList.contains('open');
  const tmp     = document.createElement('div');
  tmp.innerHTML = renderCard(m);
  const newCard = tmp.firstChild;
  if (wasOpen) newCard.classList.add('open');
  card.replaceWith(newCard);
}

function refreshAllCalcs() {
  if (scanData.length) renderAll();
}

function toggleCard(rid) {
  document.getElementById(`card-${rid}`)?.classList.toggle('open');
}

// ── Helpers ───────────────────────────────────────────────────
function skeleton(n) {
  return Array.from({length:n}, () =>
    `<div class="loading-card">
      <div class="loading-line" style="width:55%;margin-bottom:8px"></div>
      <div class="loading-line" style="width:35%"></div>
    </div>`).join('');
}
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
buildBookChips();
</script>
</body>
</html>
